<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>flora — botanical country data</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f0e8;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
canvas{display:block;width:100%;height:100%;}
#info{position:fixed;bottom:0;left:0;right:0;pointer-events:none;z-index:10;text-align:center;padding:16px 20px 28px;font-family:Georgia,'Times New Roman',serif;}
#info .name{font-size:22px;color:#5d4037;letter-spacing:0.5px;margin-bottom:2px;opacity:0;transition:opacity 0.8s ease;}
#info .pop{font-size:13px;color:rgba(0,0,0,0.5);opacity:0;transition:opacity 0.8s ease;}
#info .desc{font-size:12px;color:rgba(0,0,0,0.3);margin-top:18px;font-style:italic;letter-spacing:0.3px;}
#info .datasource{font-size:10px;color:rgba(0,0,0,0.25);letter-spacing:0.5px;margin-bottom:4px;margin-top:4px;opacity:0;transition:opacity 0.8s ease;}
#info .flag-dots{display:flex;justify-content:center;gap:6px;margin-bottom:2px;opacity:0;transition:opacity 0.8s ease;}
#info .flag-dots .dot{width:8px;height:8px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,0.08);}
#info .pop .dens{font-size:10px;color:rgba(0,0,0,0.35);margin-left:4px;letter-spacing:0.3px;}
#info.show .name,#info.show .pop,#info.show .datasource,#info.show .flag-dots{opacity:1;}
#tap-hint{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:10;font-family:Georgia,serif;font-size:13px;color:rgba(0,0,0,0.25);pointer-events:none;opacity:0;transition:opacity 1.5s ease;letter-spacing:1px;}
#tap-hint.show{opacity:1;}
#databar{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);z-index:10;font:10px/1 system-ui,sans-serif;color:rgba(0,0,0,0.25);letter-spacing:1px;pointer-events:none;opacity:0;transition:opacity 1.5s ease}
#databar.show{opacity:1}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;font-family:Georgia,serif;font-size:16px;color:rgba(0,0,0,0.3);letter-spacing:2px;}
#loading.hidden{opacity:0;transition:opacity 0.8s ease;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info"><div class="name"></div><div class="pop"></div><div class="flag-dots"></div><div class="datasource">REST Countries · — countries · cached at load</div><div class="desc">each country grows into a flower · tap to drift</div></div>
<div id="tap-hint">↻ tap for next</div>
<div id="loading">gathering seeds …</div>
<div id="databar">REST Countries · loading...</div>
<script>
// ─── CONFIG ───────────────────────────────────────────────
const CONFIG = {
  palette: {
    bg: '#f5f0e8',
    surface: '#ebe3d5',
    accent1: '#8d6e63',
    accent2: '#a1887f',
    accent3: '#ef9a9a',
    highlight: '#26a69a',
    text: 'rgba(0,0,0,0.7)',
    dark: '#5d4037',
  },
  countries: ['USA','India','China','Brazil','Japan','France','UK','AU','EG','MX','RU','KR','NG','DE','IT'],
  petalMin: 5,
  petalMax: 12,
  stemBase: 60,
  stemScale: 160,
  animDuration: 2500,
  transitionDuration: 600,
  globalAlpha: 0.75,
};

// ─── FALLBACK DATA ───────────────────────────────────────
const FALLBACK = [
  {name:{common:'United States'},population:335000000,area:9834000,cca2:'US',flags:{png:'https://flagcdn.com/w320/us.png'}},
  {name:{common:'India'},population:1450000000,area:3287000,cca2:'IN',flags:{png:'https://flagcdn.com/w320/in.png'}},
  {name:{common:'China'},population:1420000000,area:9597000,cca2:'CN',flags:{png:'https://flagcdn.com/w320/cn.png'}},
  {name:{common:'Brazil'},population:216000000,area:8516000,cca2:'BR',flags:{png:'https://flagcdn.com/w320/br.png'}},
  {name:{common:'Japan'},population:123000000,area:378000,cca2:'JP',flags:{png:'https://flagcdn.com/w320/jp.png'}},
  {name:{common:'France'},population:68000000,area:551000,cca2:'FR',flags:{png:'https://flagcdn.com/w320/fr.png'}},
  {name:{common:'United Kingdom'},population:68000000,area:243000,cca2:'GB',flags:{png:'https://flagcdn.com/w320/gb.png'}},
  {name:{common:'Australia'},population:27000000,area:7692000,cca2:'AU',flags:{png:'https://flagcdn.com/w320/au.png'}},
  {name:{common:'Egypt'},population:111000000,area:1002000,cca2:'EG',flags:{png:'https://flagcdn.com/w320/eg.png'}},
  {name:{common:'Mexico'},population:129000000,area:1964000,cca2:'MX',flags:{png:'https://flagcdn.com/w320/mx.png'}},
  {name:{common:'Russia'},population:144000000,area:17100000,cca2:'RU',flags:{png:'https://flagcdn.com/w320/ru.png'}},
  {name:{common:'South Korea'},population:52000000,area:100000,cca2:'KR',flags:{png:'https://flagcdn.com/w320/kr.png'}},
  {name:{common:'Nigeria'},population:224000000,area:923000,cca2:'NG',flags:{png:'https://flagcdn.com/w320/ng.png'}},
  {name:{common:'Germany'},population:84000000,area:357000,cca2:'DE',flags:{png:'https://flagcdn.com/w320/de.png'}},
  {name:{common:'Italy'},population:59000000,area:301000,cca2:'IT',flags:{png:'https://flagcdn.com/w320/it.png'}},
];

// ─── FLAG COLOR MAPS (manual from known flags) ────────────
const FLAG_COLORS = {
  US: ['#b22234','#ffffff','#3c3b6e'],
  IN: ['#ff9933','#ffffff','#138808','#000080'],
  CN: ['#de2910','#ffde00'],
  BR: ['#009739','#ffdf00','#002776','#ffffff'],
  JP: ['#ffffff','#bc002d'],
  FR: ['#002395','#ffffff','#ed2939'],
  GB: ['#012169','#ffffff','#c8102e'],
  AU: ['#00008b','#ffffff','#e00000'],
  EG: ['#ce1126','#ffffff','#000000','#c09300'],
  MX: ['#006341','#ffffff','#ce1126'],
  RU: ['#ffffff','#0039a6','#d52b1e'],
  KR: ['#ffffff','#003478','#c60c30','#000000'],
  NG: ['#ffffff','#008751'],
  DE: ['#000000','#dd0000','#ffcc00'],
  IT: ['#009246','#ffffff','#ce2b37'],
};

// ─── CANVAS SETUP ─────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2;
  cy = H * 0.55;
}
resize();
window.addEventListener('resize', resize);

// ─── STATE ────────────────────────────────────────────────
let countries = [];
let currentIdx = 0;
let animT = 0;         // 0..1 growth animation progress
let transAlpha = 1;    // 0..1 transition crossfade
let state = 'loading'; // 'loading' | 'growing' | 'idle' | 'transition'
let lastTime = 0;
let needNew = true;

const infoEl = document.querySelector('#info');
const nameEl = infoEl.querySelector('.name');
const popEl = infoEl.querySelector('.pop');
const flagDotsEl = infoEl.querySelector('.flag-dots');
const datasourceEl = infoEl.querySelector('.datasource');
const hintEl = document.getElementById('tap-hint');
const loadingEl = document.getElementById('loading');

// ─── DATA FETCH ────────────────────────────────────────────
async function fetchData() {
  try {
    const res = await fetch('https://restcountries.com/v3.1/all');
    const all = await res.json();
    const wanted = new Set(CONFIG.countries);
    const lookup = {};
    // Also match by cca2
    for (const c of all) lookup[c.cca2] = c;
    // Build ordered list
    const result = [];
    for (const code of CONFIG.countries) {
      let match = all.find(c => c.cca2 === code);
      if (!match) match = all.find(c => c.name?.common?.toLowerCase().includes(code.toLowerCase()));
      if (match) result.push(match);
    }
    if (result.length >= 5) {
      lastFetchTime = performance.now();
      datasourceEl.textContent = 'REST Countries · ' + result.length + ' countries · cached at load';
      return result;
    }
    throw new Error('Not enough matches');
  } catch(e) {
    console.warn('API fetch failed, using fallback:', e);
    datasourceEl.textContent = 'REST Countries · ' + FALLBACK.length + ' countries · cached at load';
    return FALLBACK;
  }
}

// Format population
function fmtPop(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return ''+n;
}

// Get flower params from country
function getParams(c) {
  const pop = c.population || 1;
  const area = c.area || 1000;
  const code = c.cca2;
  const density = pop / Math.max(area, 1);
  
  // Stem height: log scale for visual balance
  const stemH = CONFIG.stemBase + Math.log10(pop) / Math.log10(1.5e9) * CONFIG.stemScale;
  
  // Petal count: 5-12 based on area
  const areaNorm = Math.min(1, Math.log10(area + 1) / Math.log10(1.7e7));
  const petals = Math.round(CONFIG.petalMin + areaNorm * (CONFIG.petalMax - CONFIG.petalMin));
  
  // Branch density: 2-5 branches based on population density
  const densNorm = Math.min(1, Math.log10(density + 1) / 4);
  const branches = 2 + Math.round(densNorm * 3);
  
  // Petal colors from flag map
  const colors = FLAG_COLORS[code] || ['#8d6e63','#a1887f','#ef9a9a'];
  
  // Stem width based on population
  const stemW = 2 + Math.log10(pop) / Math.log10(1.5e9) * 5;
  
  // Flower radius based on area
  const radius = 30 + areaNorm * 60;
  
  return { stemH, petals, branches, colors, stemW, radius, density, areaNorm };
}

// ─── DRAWING ───────────────────────────────────────────────
function drawPaperTexture() {
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.03)';
  ctx.lineWidth = 0.5;
  for (let y = 20; y < H; y += 18 + Math.random() * 12) {
    ctx.beginPath();
    ctx.moveTo(10, y);
    ctx.lineTo(W - 20 + Math.random() * 20, y + Math.random() * 3 - 1.5);
    ctx.stroke();
  }
  ctx.restore();
}

function drawLeaf(ctx, x, y, size, angle, color, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha * 0.7;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(size * 0.5, -size * 0.3, size * 0.8, 0, size * 0.5, size * 0.3);
  ctx.bezierCurveTo(size * 0.8, 0, size * 0.5, -size * 0.3, 0, 0);
  ctx.fill();
  ctx.restore();
}

function drawStem(ctx, x, yBot, yTop, width, progress, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.85;
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  
  const drawH = (yTop - yBot) * progress;
  const yEnd = yBot + drawH;
  
  // Gentle organic curve
  ctx.beginPath();
  ctx.moveTo(x, yBot);
  const cp1x = x + Math.sin(Date.now() / 8000) * 3;
  const cp1y = yBot + drawH * 0.3;
  const cp2x = x + Math.sin(Date.now() / 10000 + 0.5) * 5;
  const cp2y = yBot + drawH * 0.6;
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x + Math.sin(Date.now() / 12000) * 2, yEnd);
  ctx.stroke();
  
  ctx.restore();
  return yEnd;
}

function drawBranches(ctx, x, yBot, yTop, count, progress, alpha) {
  ctx.save();
  const spread = 40 + Math.random() * 10;
  for (let i = 0; i < count; i++) {
    const t = (i + 1) / (count + 1);
    const branchY = yBot + (yTop - yBot) * t * progress;
    if (branchY <= yBot) continue;
    const side = (i % 2 === 0) ? 1 : -1;
    const bLen = 15 + Math.random() * 20 * progress;
    const bAngle = side * (0.3 + Math.random() * 0.4);
    
    ctx.globalAlpha = alpha * 0.5;
    ctx.strokeStyle = '#5d4037';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, branchY);
    const endX = x + Math.cos(bAngle) * bLen * side;
    const endY = branchY - Math.sin(Math.abs(bAngle)) * bLen * 0.5;
    ctx.quadraticCurveTo(x + Math.cos(bAngle) * bLen * 0.5 * side, branchY - bLen * 0.3, endX, endY);
    ctx.stroke();
    
    // Tiny leaf at tip
    drawLeaf(ctx, endX, endY, 4 + Math.random() * 3, bAngle + (side > 0 ? 0.5 : -0.5), CONFIG.palette.accent2, alpha * progress);
  }
  ctx.restore();
}

function drawPetal(ctx, px, py, angle, length, width, color, progress, alpha) {
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha * CONFIG.globalAlpha * (0.7 + Math.random() * 0.2);
  ctx.fillStyle = color;
  
  const pLen = length * progress;
  const pW = width * (0.5 + 0.5 * progress);
  
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(
    pW * 0.8, -pLen * 0.3,
    pW * 0.3, -pLen * 0.8,
    0, -pLen
  );
  ctx.bezierCurveTo(
    -pW * 0.3, -pLen * 0.8,
    -pW * 0.8, -pLen * 0.3,
    0, 0
  );
  ctx.fill();
  
  // Subtle center line
  ctx.globalAlpha *= 0.3;
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, -pLen * 0.9);
  ctx.stroke();
  
  ctx.restore();
}

function drawFlowerCenter(ctx, x, y, radius, progress, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.9;
  
  // Center disc
  const r = radius * 0.25 * progress;
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, CONFIG.palette.accent3);
  grad.addColorStop(0.5, CONFIG.palette.accent1);
  grad.addColorStop(1, CONFIG.palette.dark);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  
  // Tiny dots around center
  ctx.globalAlpha = alpha * 0.4 * progress;
  ctx.fillStyle = CONFIG.palette.highlight;
  const dotCount = 6 + Math.round(progress * 6);
  for (let i = 0; i < dotCount; i++) {
    const a = (i / dotCount) * Math.PI * 2 + Date.now() / 5000;
    const dr = r * 0.6;
    ctx.beginPath();
    ctx.arc(x + Math.cos(a) * dr, y + Math.sin(a) * dr, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.restore();
}

function drawFlower(ctx, c, progress, alpha) {
  const p = getParams(c);
  const flowerX = cx + Math.sin(Date.now() / 8000) * 5;
  const flowerY = cy + H * 0.15;
  const stemTop = flowerY - p.stemH * progress;
  
  // Stem
  drawStem(ctx, flowerX, flowerY, flowerY - p.stemH, p.stemW, progress, alpha);
  
  // Branches
  drawBranches(ctx, flowerX, flowerY, flowerY - p.stemH * 0.7, p.branches, progress, alpha);
  
  // Petals
  const petalProgress = Math.min(1, progress * 1.3);
  const petalLength = p.radius * 0.7;
  const petalWidth = petalLength * 0.4;
  
  for (let i = 0; i < p.petals; i++) {
    const angle = (i / p.petals) * Math.PI * 2 - Math.PI / 2;
    const color = p.colors[i % p.colors.length];
    const offset = Math.sin(Date.now() / 4000 + i * 1.5) * 2;
    drawPetal(ctx, flowerX + offset, stemTop, angle, petalLength, petalWidth, color, petalProgress, alpha);
  }
  
  // Sway animation for petals
  const sway = Math.sin(Date.now() / 3000) * 2;
  for (let i = 0; i < p.petals; i++) {
    const angle = (i / p.petals) * Math.PI * 2 - Math.PI / 2 + sway * 0.02;
    const color = p.colors[i % p.colors.length];
    drawPetal(ctx, flowerX, stemTop, angle, petalLength * 0.85, petalWidth * 0.8, color, petalProgress * 0.7, alpha * 0.4);
  }
  
  // Center
  drawFlowerCenter(ctx, flowerX, stemTop, p.radius, progress, alpha);
  
  // Small floating particles (pollen)
  for (let i = 0; i < 3; i++) {
    const t = (Date.now() / 3000 + i * 1.7) % 1;
    const px = flowerX + Math.sin(t * Math.PI * 2 + i) * 50 * progress;
    const py = stemTop - 20 + Math.cos(t * Math.PI * 2 + i * 2) * 30 * progress;
    ctx.save();
    ctx.globalAlpha = alpha * 0.2 * (1 - t);
    ctx.fillStyle = CONFIG.palette.accent3;
    ctx.beginPath();
    ctx.arc(px, py, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── INFO UPDATE ──────────────────────────────────────────
function updateInfo(c, show) {
  if (!c) return;
  nameEl.textContent = c.name?.common || 'Unknown';
  const pop = c.population || 0;
  const area = c.area || 1;
  const density = Math.round(pop / area);
  popEl.innerHTML = 'population ' + fmtPop(pop) + ' <span class="dens">' + fmtPop(density) + '/km²</span>';
  // Flag palette dots
  const colors = FLAG_COLORS[c.cca2] || ['#8d6e63','#a1887f','#ef9a9a'];
  flagDotsEl.innerHTML = colors.slice(0, 3).map(col =>
    '<span class="dot" style="background:' + col + '"></span>'
  ).join('');
  infoEl.classList.toggle('show', show);
  updateDataBar(c.name?.common || 'Unknown', c.population || 0, c.area || 0);
}

// ─── RENDER LOOP ───────────────────────────────────────────
function render(time) {
  const dt = lastTime ? Math.min(time - lastTime, 50) : 16;
  lastTime = time;
  
  // Clear
  ctx.fillStyle = CONFIG.palette.bg;
  ctx.fillRect(0, 0, W, H);
  
  // Paper texture
  drawPaperTexture();
  
  // State machine
  switch(state) {
    case 'loading':
      // Just show background
      break;
      
    case 'growing': {
      animT += dt / CONFIG.animDuration;
      if (animT >= 1) { animT = 1; state = 'idle'; }
      const ease = 1 - Math.pow(1 - animT, 3); // ease-out cubic
      const c = countries[currentIdx];
      if (c) {
        drawFlower(ctx, c, ease, 1);
        if (ease > 0.3) updateInfo(c, true);
        else infoEl.classList.remove('show');
      }
      break;
    }
    
    case 'idle': {
      const c = countries[currentIdx];
      if (c) {
        // Gentle idle sway
        drawFlower(ctx, c, 1, 1);
        updateInfo(c, true);
      }
      break;
    }
    
    case 'transition': {
      transAlpha -= dt / CONFIG.transitionDuration;
      if (transAlpha <= 0) {
        transAlpha = 0;
        // Move to next
        currentIdx = (currentIdx + 1) % countries.length;
        state = 'growing';
        animT = 0;
        needNew = true;
        infoEl.classList.remove('show');
      }
      // Draw current fading out
      const oldIdx = currentIdx;
      const oldC = countries[oldIdx];
      if (oldC) {
        drawFlower(ctx, oldC, 1, Math.max(0, transAlpha));
      }
      break;
    }
  }
  
  // Subtle gradient overlay at bottom
  const grad = ctx.createLinearGradient(0, H - 80, 0, H);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, CONFIG.palette.bg);
  ctx.fillStyle = grad;
  ctx.fillRect(0, H - 80, W, 80);
  
  requestAnimationFrame(render);
}

// ─── DATA BAR ──────────────────────────────────────────────
let lastFetchTime = 0;
function updateDataBar(name, pop, area) {
  const el = document.getElementById('databar');
  if (!el) return;
  const density = area > 0 ? Math.round(pop / area) : 0;
  const now = performance.now();
  const ago = lastFetchTime ? Math.round((now - lastFetchTime) / 1000) + 's ago' : 'just now';
  el.textContent = `REST Countries · ${name} · ${density}/km² density · fetched ${ago}`;
  el.classList.add('show');
}

// ─── TOUCH / CLICK ────────────────────────────────────────
function handleTap(e) {
  e.preventDefault();
  if (state === 'growing' || state === 'loading') return;
  if (state === 'transition') return;
  if (countries.length < 2) return;
  state = 'transition';
  transAlpha = 1;
  // Hide hint after first tap
  hintEl.classList.remove('show');
}
canvas.addEventListener('click', handleTap);
canvas.addEventListener('touchstart', handleTap, {passive:false});

// ─── INIT ──────────────────────────────────────────────────
async function init() {
  countries = await fetchData();
  loadingEl.classList.add('hidden');
  setTimeout(() => {
    state = 'growing';
    animT = 0;
    updateInfo(countries[0], false);
    // Show tap hint after a delay
    setTimeout(() => hintEl.classList.add('show'), CONFIG.animDuration + 1000);
  }, 400);
  requestAnimationFrame(render);
}

init();
</script>
</body>
</html>
